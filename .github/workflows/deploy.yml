name: gangwardev CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: "npm"

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test --if-present

  # Un-comment below if running Playwright/Cypress for E2E testing
  # - name: Install E2E Test Runner Browsers
  #   run: npx playwright install --with-deps
  # - name: Run E2E Tests
  #   run: npm run test:e2e --if-present

  deploy-to-ec2:
    needs: test-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Secure Remote SSH Execution
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Source NVM profile explicitly to make node/npm accessible to the SSH session
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 1. Navigate directly into your inner code folder
            cd /var/www/gangwardev_nextjs/gangwardev_next

            # 2. Reset adjustments and grab target code state
            git reset --hard origin/main
            git pull origin main

            # 3. Install fresh production builds
            npm ci
            npm run build

            # 4. Zero downtime engine reload pointing explicitly to the subfolder
            pm2 reload gangwar-next || pm2 start npm --name "gangwar-next" --cwd "/var/www/gangwardev_nextjs/gangwardev_next" -- start -- -p 4000
