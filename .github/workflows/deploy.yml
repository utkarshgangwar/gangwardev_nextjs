name: gangwardev CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
          cache: "npm"

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test --if-present

  # Un-comment below if running Playwright/Cypress for E2E testing
  # - name: Install E2E Test Runner Browsers
  #   run: npx playwright install --with-deps
  # - name: Run E2E Tests
  #   run: npm run test:e2e --if-present

  deploy-to-ec2:
    needs: test-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: Secure Remote SSH Execution
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Force load NVM and explicitly append it to the active path
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$NVM_DIR/versions/node/$(nvm current)/bin:$PATH"

            # 2. Debug lines (Optional: This prints the versions in your GitHub logs so you can verify)
            node -v
            npm -v

            cd /var/www/gangwardev_nextjs
            git reset --hard origin/main
            git pull origin main

            # 3. Clean and explicitly build
            npm install
            npm run build

            # 4. Zero downtime engine reload
            pm2 reload gangwar-next || pm2 start npm --name "gangwar-next" --cwd "/var/www/gangwardev_nextjs" -- start -- -p 3000
